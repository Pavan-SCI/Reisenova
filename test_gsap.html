<!DOCTYPE html>
<html>
<head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
  .box { width: 200px; height: 200px; background: red; border-radius: 16px; margin: 50px; }
</style>
</head>
<body>
  <div class="box"></div>
  <script>
    gsap.fromTo('.box', 
      { clipPath: 'inset(100% 0% 0% 0% round 16px)' },
      { clipPath: 'inset(0% 0% 0% 0% round 16px)', duration: 2, repeat: -1, yoyo: true }
    );
  </script>
</body>
</html>
